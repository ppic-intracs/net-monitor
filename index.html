<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Netmon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased h-[100dvh] flex flex-col overflow-hidden">

    <nav class="bg-gray-800 border-b border-gray-700 px-4 py-2 flex-shrink-0 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-base font-bold text-emerald-400 flex items-center gap-1.5">
                ⚡ <span class="tracking-wide">NetMon</span>
            </h1>
            <button onclick="fetchData()" class="bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-semibold py-1 px-3 rounded-lg transition duration-150 text-[11px] shadow">
                Refresh
            </button>
        </div>
    </nav>

    <main class="flex-1 flex flex-col p-3 max-w-md mx-auto w-full overflow-hidden justify-between">
        
        <div class="grid grid-cols-3 gap-2 flex-shrink-0">
            <div class="bg-gray-800 p-2 rounded-lg border border-gray-700 text-center shadow">
                <p class="text-gray-400 text-[9px] font-bold uppercase tracking-wider">Lokasi</p>
                <p id="total-devices" class="text-base font-black text-white">-</p>
            </div>
            <div class="bg-gray-800 p-2 rounded-lg border border-gray-700 text-center shadow">
                <p class="text-gray-400 text-[9px] font-bold uppercase tracking-wider">Online</p>
                <p id="online-devices" class="text-base font-black text-emerald-400">-</p>
            </div>
            <div class="bg-gray-800 p-2 rounded-lg border border-gray-700 text-center shadow">
                <p class="text-gray-400 text-[9px] font-bold uppercase tracking-wider">Offline</p>
                <p id="offline-devices" class="text-base font-black text-rose-500">-</p>
            </div>
        </div>

        <div class="flex justify-between items-center my-2 px-1 flex-shrink-0">
            <h2 class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">Status Perangkat</h2>
            <span id="loading-status" class="text-[10px] text-gray-500 italic">Memuat...</span>
        </div>

        <div id="device-list" class="flex-1 flex flex-col gap-1.5 overflow-hidden">
            </div>

    </main>

    <script>
        // CONFIGURATION
        const SUPABASE_URL = "https://tgnzwysgvnzftizeroqb.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_FCMD51RuoqkIzp_7sa5TBg_bhEa-mD5";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Daftar lokasi tetap (Master Data)
        const targetLocations = [
            "KM_19",
            "BXC",
            "KP_MELAYU",
            "PULO_GADUNG",
            "CAWANG_SENTRAL",
            "BLOK_M",
            "RND"
        ];

        async function fetchData() {
            const statusText = document.getElementById('loading-status');
            const deviceList = document.getElementById('device-list');
            
            if (statusText) statusText.innerText = "Memperbarui...";

            try {
                const { data, error } = await supabaseClient
                    .from('uptime_logs')
                    .select('id, lokasi, waktu')
                    .order('waktu', { ascending: false });

                if (error) throw error;

                const latestLogsByLocation = {};
                if (data && data.length > 0) {
                    data.forEach(log => {
                        const locName = String(log.lokasi).trim();
                        if (!latestLogsByLocation[locName]) {
                            latestLogsByLocation[locName] = log;
                        }
                    });
                }

                deviceList.innerHTML = "";
                
                let onlineCount = 0;
                let offlineCount = 0;
                const currentTime = new Date();

                targetLocations.forEach((lokasi, index) => {
                    const matchedLog = latestLogsByLocation[lokasi];
                    let status = "Offline";
                    let formatWaktu = "Belum ada log";
                    
                    if (matchedLog) {
                        const waktuLog = new Date(matchedLog.waktu);
                        const selisihMenit = (currentTime - waktuLog) / (1000 * 60);

                        const dd = String(waktuLog.getDate()).padStart(2, '0');
                        const mm = String(waktuLog.getMonth() + 1).padStart(2, '0'); // Bulan dimulai dari 0
                        const yyyy = waktuLog.getFullYear();
                        
                        const hh = String(waktuLog.getHours()).padStart(2, '0');
                        const min = String(waktuLog.getMinutes()).padStart(2, '0');
                        
                        formatWaktu = `${dd}-${mm}-${yyyy} ${hh}:${min}`;

                        //formatWaktu = waktuLog.toLocaleTimeString('id-ID', {
                        //    hour: '2-digit',
                        //    minute: '2-digit'
                        //}) + " | " + waktuLog.toLocaleDateString('id-ID', {
                        //    day: 'numeric',
                        //    month: 'short'
                        //});

                        if (selisihMenit < 59 && selisihMenit >= 0) {
                            status = "Online";
                        }
                    }

                    if (status === "Online") {
                        onlineCount++;
                    } else {
                        offlineCount++;
                    }

                    const isOnline = status === "Online";
                    const badgeClass = isOnline 
                        ? "bg-emerald-950 text-emerald-400 border-emerald-500/20" 
                        : "bg-rose-950 text-rose-400 border-rose-500/20";
                    
                    const borderLeftClass = isOnline 
                        ? "border-l-4 border-l-emerald-500" 
                        : "border-l-4 border-l-rose-500";

                    // Kartu dibuat super ringkas (tinggi pas ~48px) agar muat 7 baris di layar kecil
                    const card = `
                        <div class="bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700/80 ${borderLeftClass} shadow-sm flex justify-between items-center h-[48px] flex-shrink-0 transition duration-150 active:bg-gray-750">
                            <div class="min-w-0 flex-1 pr-2">
                                <div class="flex items-baseline gap-1.5">
                                    <span class="text-[10px] font-mono text-gray-500">#${index + 1}</span>
                                    <h3 class="font-bold text-white text-xs truncate tracking-wide">${lokasi}</h3>
                                </div>
                                <p class="text-[9px] text-gray-400 truncate mt-0.5">
                                    🕒 ${formatWaktu}
                                </p>
                            </div>
                            <div class="flex-shrink-0">
                                <span class="px-2 py-0.5 text-[9px] font-extrabold rounded-md border ${badgeClass}">
                                    ${status}
                                </span>
                            </div>
                        </div>
                    `;
                    deviceList.innerHTML += card;
                });

                document.getElementById('total-devices').innerText = targetLocations.length;
                document.getElementById('online-devices').innerText = onlineCount;
                document.getElementById('offline-devices').innerText = offlineCount;

                if (statusText) {
                    statusText.innerText = "Update terakhir : " + currentTime.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                }

            } catch (error) {
                console.error("Error:", error);
                if (statusText) statusText.innerText = "Gagal.";
            }
        }

        window.onload = fetchData;
        setInterval(fetchData, 30000);
    </script>
</body>
</html>
